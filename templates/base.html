<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%236366f1'/><circle cx='35' cy='72' r='12' fill='white'/><circle cx='65' cy='64' r='12' fill='white'/><rect x='44' y='20' width='5' height='52' fill='white'/><rect x='74' y='12' width='5' height='52' fill='white'/><rect x='44' y='16' width='35' height='6' rx='3' fill='white'/></svg>">
    <title>Music Catch</title>
    <link rel="stylesheet" href="/static/css/base.css">
    {% block head %}{% endblock %}
    <link rel="stylesheet" href="/static/css/responsive.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <a href="/">Music Catch</a>
        </div>
        <div class="nav-links">
            <button class="nav-link" onclick="clearAudioCache()" title="清除音频缓存">清缓存</button>
            <a href="/" class="nav-link {% if request.url.path == '/' %}active{% endif %}">搜索</a>
            <a href="/login" class="nav-link {% if request.url.path == '/login' %}active{% endif %}">登录</a>
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <script src="/static/js/app.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
